_schema-version: "3.2"
ID: ypf
version: 0.0.1
modules:
- name: ypf-destination-content
  type: com.sap.application.content
  requires:
  - name: ypf-destination-service
    parameters:
      content-target: true
  - name: ypf_html_repo_host
    parameters:
      service-key:
        name: ypf_html_repo_host-key
  - name: uaa_ypf
    parameters:
      service-key:
        name: uaa_ypf-key
  parameters:
    content:
      instance:
        destinations:
        - Name: solicitud_ypf_html_repo_host
          ServiceInstanceName: ypf-html5-app-host-service
          ServiceKeyName: ypf_html_repo_host-key
          sap.cloud.service: solicitud
        - Authentication: OAuth2UserTokenExchange
          Name: solicitud_uaa_ypf
          ServiceInstanceName: ypf-xsuaa-service
          ServiceKeyName: uaa_ypf-key
          sap.cloud.service: solicitud
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: ypf-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: ypf_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - ypfypfui5hrsaldo.zip
      name: ypfypfui5hrsaldo
      target-path: resources/
- name: ypfypfui5hrsaldo
  type: html5
  path: ypf_ui5_hr_saldo
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: ypf-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: ypf-destination-service
    service-plan: lite
- name: ypf_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: ypf-html5-app-host-service
    service-plan: app-host
- name: uaa_ypf
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: ypf-xsuaa-service
    service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
